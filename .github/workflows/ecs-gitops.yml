name: GitOps ECS Deployment

on:
  push:
    branches:
      - gitops

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "113645088585"

  FRONTEND_IMAGE: 113645088585.dkr.ecr.us-east-1.amazonaws.com/frontend
  BACKEND_IMAGE: 113645088585.dkr.ecr.us-east-1.amazonaws.com/backend

  ECS_CLUSTER: techchallenge1-cluster
  FRONTEND_SERVICE: techchallenge1-frontend-svc
  BACKEND_SERVICE: techchallenge1-backend-svc

  FRONTEND_CONTAINER_NAME: frontend
  BACKEND_CONTAINER_NAME: backend

jobs:
  build-and-deploy:
    name: Build and Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./frontend
          docker push $FRONTEND_IMAGE:${{ github.sha }}

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} ./backend
          docker push $BACKEND_IMAGE:${{ github.sha }}

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/frontend-task-def.json
          container-name: ${{ env.FRONTEND_CONTAINER_NAME }}
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy frontend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definitions/backend-task-def.json
          container-name: ${{ env.BACKEND_CONTAINER_NAME }}
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true