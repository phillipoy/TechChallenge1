name: GitOps ECS Deployment

on:
  push:
    branches:
      - gitops

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "113645088585"

  FRONTEND_ECR_REPOSITORY: frontend
  BACKEND_ECR_REPOSITORY: backend

  FRONTEND_IMAGE: 113645088585.dkr.ecr.us-east-1.amazonaws.com/frontend
  BACKEND_IMAGE: 113645088585.dkr.ecr.us-east-1.amazonaws.com/backend

  ECS_CLUSTER: techchallenge1-cluster
  FRONTEND_SERVICE: techchallenge1-frontend-svc
  BACKEND_SERVICE: techchallenge1-backend-svc

jobs:
  build-and-deploy:
    name: Build and Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:latest ./frontend
          docker push $FRONTEND_IMAGE:latest

      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE:latest ./backend
          docker push $BACKEND_IMAGE:latest

      - name: Deploy frontend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --force-new-deployment

      - name: Deploy backend service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --force-new-deployment